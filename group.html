<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salt Company — Group Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <div class="nav-brand">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
      </svg>
    </div>
    <span class="nav-title">Salt Company</span>
    <span class="nav-sub">/ Group Detail</span>
  </div>
  <div class="nav-right">
    <a href="dashboard.html" class="btn">← Dashboard</a>
  </div>
</nav>
<div class="page">
  <div id="content">
    <div class="state-center"><div class="spinner"></div><span>Loading group…</span></div>
  </div>
</div>

<script type="module">
  import { requireAuth } from "./js/auth.js";
  import { db } from "./js/firebase-init.js";
  import { doc, getDoc, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  requireAuth(async (user) => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { document.getElementById('content').innerHTML = '<p style="color:var(--danger)">No group specified.</p>'; return; }

    const snap = await getDoc(doc(db, 'groups', id));
    if (!snap.exists()) { document.getElementById('content').innerHTML = '<p style="color:var(--danger)">Group not found.</p>'; return; }

    const g = snap.data();
    document.title = `Salt Company — ${g.short_name}`;
    document.getElementById('content').innerHTML = `
      <div class="page-eyebrow">Connection Group</div>
      <h1 class="page-title" style="margin-bottom:4px">${g.short_name}</h1>
      <p class="page-meta" style="margin-bottom:32px">${g.leaders || '—'} · ${g.members_count || 0} members · ${g.total_meetings || 0} meetings</p>
      <div class="state-center card" style="min-height:300px">
        <p style="color:var(--text-3)">Full group detail view — coming in Phase 4.</p>
        <p style="color:var(--text-3);font-size:12px;margin-top:8px">Will show RAP notes, attendance chart, and member list.</p>
      </div>
    `;
  }, () => { window.location.href = './index.html'; });
</script>
</body>
</html>
